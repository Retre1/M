tft:
  # Increased from 32 → 128: gives the transformer enough capacity to model
  # 40+ features across multiple market regimes. 32 was empirically too small
  # and caused under-fitting on noisy mixed / full-real training stages.
  d_model: 128
  n_heads: 8           # was 4 — more heads for richer multi-scale attention
  n_encoder_layers: 2  # was 1 — deeper temporal encoding
  n_decoder_layers: 2  # was 1 — deeper future-context decoding
  dropout: 0.1
  hidden_continuous_size: 64   # was 16 — proportional to d_model
  attention_head_size: 64      # was 16 — d_model // n_heads for full rank
  known_future_inputs:
    - hour_sin
    - hour_cos
    - dow_sin
    - dow_cos
    - session_id

agents:
  trend:
    hidden_sizes: [128, 128, 64]
    activation: relu
    dropout: 0.1

  reversion:
    hidden_sizes: [128, 128, 64]
    activation: relu
    dropout: 0.1
    z_score_threshold: 3.0

gating:
  hidden_sizes: [64, 32]
  n_agents: 3

rl:
  algorithm: SAC  # SAC | PPO
  gamma: 0.99
  learning_rate: 0.0003
  buffer_size: 100000
  batch_size: 256
  ent_coef: auto
  tau: 0.005
  train_freq: 4
  gradient_steps: 4
  learning_starts: 5000

# Multi-Timeframe settings
mtf:
  enabled: true
  lookback:
    d1: 5    # 5 daily bars (~1 trading week)
    h1: 20   # 20 hourly bars (~1 trading day)
    m5: 20   # 20 five-min bars (~1.7 hours)
  fusion:
    dropout: 0.1
  n_mtf_context: 6
