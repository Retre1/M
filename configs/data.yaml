timeframes:
  - M1
  - M5
  - H1
  - D1

lookback_bars: 500
feature_window: 20
tick_buffer_size: 100000
bar_history_days: 750

# Last 20% of historical data is locked as a sacred OOS test set.
# NEVER use this data during training, walk-forward, or hyperparameter search.
# Only unlock it with OOSGuard.unlock_oos() for final production evaluation.
oos_fraction: 0.2

storage:
  format: parquet
  compression: snappy
  partition_by: [symbol, timeframe]

collection:
  poll_interval_ms: 100
  flush_interval_s: 60
  max_ticks_per_flush: 50000
