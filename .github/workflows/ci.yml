# =============================================================================
# ApexFX Quantum — CI Pipeline
# Runs: lint (ruff) + unit tests on every push/PR
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.1

      - name: Run ruff check
        run: ruff check src/ tests/ --output-format=github

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch first (smaller, faster)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,dashboard,nlp]"

      - name: Run tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --junitxml=reports/junit.xml \
            -x --timeout=120
        env:
          PYTHONPATH: src

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/junit.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --target app -t apexfx-quantum:${{ github.sha }} .
          docker build --target app -t apexfx-quantum:latest .

      - name: Verify image runs
        run: |
          docker run --rm apexfx-quantum:latest \
            python3 -c "import apexfx; print('Docker build OK')"
